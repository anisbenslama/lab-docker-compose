version: "3.9"

services:

  # =========================
  # 🗄 Database - MySQL
  # =========================
  database:
    image: mysql:8.0
    container_name: todo-database
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: >
        mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # =========================
  # 🚀 Backend - Node.js
  # =========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: database
      DB_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # 🌐 Frontend - Nginx
  # =========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:3000
    container_name: todo-frontend
    environment:
      API_URL: http://backend:3000
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    restart: unless-stopped
    healthcheck:
      test: >
        wget --no-verbose --tries=1 --spider http://localhost/
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


# =========================
# 🌐 Networks
# =========================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# =========================
# 💾 Volumes
# =========================
volumes:
  mysql-data:
    driver: local
    